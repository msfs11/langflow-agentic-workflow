version: 1.3.3
cache: true

endpoints:
  custom:
    - name: "Qwen3 (8b)"
      apiKey: "qwen"
      baseURL: "http://host.docker.internal:1234/v1"
      models:
        default:
          - "qwen/qwen3-8b"
        fetch: true
      titleConvo: true
      summarize: false

mcpSettings:
  allowedDomains:
    - "mcp-filesystem"
mcpServers:
  filesystem:
    type: "streamable-http"
    url: "http://mcp-filesystem:8000/mcp"